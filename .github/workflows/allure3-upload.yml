name: upload to allure testops using allure3

on:
  workflow_dispatch:
    inputs:
      TESTS_TYPE:
        description: "Select type of tests"
        required: true
        type: choice
        options:
          - tests/poco
          - tests/unit-many
          - tests/unit
          - tests/attachments
          - tests/fixtures
          - tests
        default: tests/poco
      PYTEST_THREADS:
        description: "How many threads, sire?"
        required: true
        default: 1

jobs:
  all-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install tests dependencies
        run: |
          python -m pip install --upgrade pip
          pip install allure-pytest pytest pytest-xdist
      - name: install allure3
        run: |
          npm install -g allure
          npm init -y
          npm add -D allure
      - name: run pytest tests and upload to Allure TestOps
        run: | 
          pnpm allure run --config=./testops.mjs -- pytest /${{ inputs.TESTS_TYPE }} -n ${{ inputs.PYTEST_THREADS }} --alluredir=allure-results
        env:
          ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT_TESTING }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN_TESTING }}
          ALLURE_PROJECT_ID: 276
          ALLURE_RESULTS: "allure-results"
          ALLURE_LAUNCH_NAME: "GitHub Actions upload using allure3"