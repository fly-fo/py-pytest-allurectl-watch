version: 2.1

parameters:
  TESTS_TYPE:
    type: string
    default: "tests/poco"
  PYTEST_THREADS:
    type: integer
    default: 1
  ALLURE_JOB_RUN_ID:
    type: string
    default: ""
  ALLURE_USERNAME:
    type: string
    default: ""

jobs:
  matrix-tests:
    parameters:
      THREADS:
        type: string
    docker:
      - image: cimg/python:3.10
    working_directory: ~/repo
    environment:
      ALLURE_RESULTS: "allure-results"
      ALLURE_PROJECT_ID: "276"
      ALLURE_JOB_RUN_ID: << pipeline.parameters.ALLURE_JOB_RUN_ID >>
      THREADS: << parameters.THREADS >>
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install pytest pytest-xdist allure-pytest
      - run:
          name: Install allurectl
          command: |
            wget https://github.com/cheshi-mantu/allurectl-local-builds/releases/latest/download/allurectl_linux_amd64 -O ./allurectl
            chmod +x ./allurectl
      - run:
          name: Run pytest tests
          command: |
            if [ "<< parameters.THREADS >>" != "ONE" ]; then
              sleep 2
            fi
            ./allurectl watch -- pytest << pipeline.parameters.TESTS_TYPE >> -n << pipeline.parameters.PYTEST_THREADS >>
          environment:
            ALLURE_RESULTS: "allure-results"
            ALLURE_LAUNCH_TAGS: "<< pipeline.parameters.TESTS_TYPE >>"
            ALLURE_TOKEN: $ALLURE_TOKEN_TESTING
            ALLURE_ENDPOINT: $ALLURE_ENDPOINT_TESTING

workflows:
  matrix:
    jobs:
      - matrix-tests:
          matrix:
            parameters:
              THREADS: ["ONE", "TWO", "THREE", "FOUR"]
