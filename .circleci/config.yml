version: 2.1

parameters:
  TESTS_TYPE:
    type: string
    default: "tests/poco"

  PYTEST_THREADS:
    type: integer
    default: 1

  ALLURE_JOB_RUN_ID:
    type: string
    default: ""

  ALLURE_USERNAME:
    type: string
    default: ""

jobs:
  run-tests:
    docker:
      - image: cimg/python:3.10

    working_directory: ~/repo

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install pytest pytest-xdist allure-pytest

      - run:
          name: Install allurectl
          command: |
            curl -fsSL \
              https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 \
              -o ./allurectl
            chmod +x ./allurectl

      - run:
          name: Run pytest tests
          environment:
            ALLURE_ENDPOINT: "https://demo.testops.cloud"
            ALLURE_PROJECT_ID: "4601"
            ALLURE_RESULTS: "allure-results"
            ALLURE_LAUNCH_NAME: "CircleCI demo"
            ALLURE_LAUNCH_TAGS: "circleci,<< pipeline.parameters.TESTS_TYPE >>"
            ALLURE_JOB_RUN_ID: "<< pipeline.parameters.ALLURE_JOB_RUN_ID >>"
            ALLURE_USERNAME: "<< pipeline.parameters.ALLURE_USERNAME >>"
          command: |
            ./allurectl watch -- \
              pytest "<< pipeline.parameters.TESTS_TYPE >>" \
              -n "<< pipeline.parameters.PYTEST_THREADS >>"

workflows:
  run:
    jobs:
      - run-tests
