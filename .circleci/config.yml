version: 2.1

parameters:
  TESTS_TYPE:
    type: string
    default: "tests/poco"
  PYTEST_THREADS:
    type: integer
    default: 1
  ALLURE_JOB_RUN_ID:
    type: string
    default: ""
  ALLURE_USERNAME:
    type: string
    default: ""

jobs:
  run-tests:
    docker:
      - image: cimg/python:3.10
    working_directory: ~/repo
    environment:
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install pytest pytest-xdist allure-pytest
      - run:
          name: Install allurectl
          command: |
            wget https://github.com/cheshi-mantu/allurectl-local-builds/releases/latest/download/allurectl_linux_amd64 -O ./allurectl
            chmod +x ./allurectl
      - run:
          name: Run pytest tests
          command: |
            ./allurectl watch -- pytest << pipeline.parameters.TESTS_TYPE >> -n << pipeline.parameters.PYTEST_THREADS >> || true
          environment:
            ALLURE_LAUNCH_TAGS: "<< pipeline.parameters.TESTS_TYPE >>"
            ALLURE_JOB_RUN_ID: << pipeline.parameters.ALLURE_JOB_RUN_ID >>
            ALLURE_USERNAME: << pipeline.parameters.ALLURE_USERNAME >>
            ALLURE_RESULTS: "allure-results"
            ALLURE_ENDPOINT: https://demo.testops.cloud/
            ALLURE_PROJECT_ID: "4601"

workflows:
  run:
    jobs:
      - run-tests
